{% extends "base.html" %}

{% block title %}Entrar – Marketplace Imóveis{% endblock %}

{% block content %}
<section class="container section auth-form">
  <h1>Entrar</h1>
  <form method="post" action="{% url 'accounts:login' %}">
    {% csrf_token %}
    {{ form.as_p }}
    <button type="submit" class="btn btn-primary">Entrar</button>
    <input type="hidden" name="next" value="{{ next }}">
  </form>
  <p><a href="{% url 'accounts:signup' %}">Não tem conta? Cadastre-se</a></p>
</section>
{% endblock %}
